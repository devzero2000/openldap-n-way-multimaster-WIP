# ==============================================================================
# TITOLO:       Configurazione e Hardening del Backend cn=Monitor
# SCOPO:        Garantire l'accesso diagnostico sicuro su tutti i nodi
# ==============================================================================

---
- name: Configurazione Accesso cn=Monitor su Cluster OpenLDAP
  hosts: cluster
  become: true
  vars:
    ldap_rootdn: "cn=admin,dc=example,dc=com"
    ldap_admin_group: "cn=administrators,ou=groups,dc=example,dc=com"

  tasks:
    - name: 1. Generazione LDIF per i permessi di accesso a cn=Monitor
      copy:
        dest: /tmp/07_configure_monitor.ldif
        content: |
          dn: olcDatabase={2}monitor,cn=config
          changetype: modify
          replace: olcAccess
          olcAccess: {0}to * by dn.base="cn=admin,dc=example,dc=com" read by group.exact="cn=administrators,ou=groups,dc=example,dc=com" read by * none

    - name: 2. Applicazione ACL del Monitor via SASL EXTERNAL
      shell: ldapmodify -Y EXTERNAL -H ldapi:/// -f /tmp/07_configure_monitor.ldif
      register: monitor_acl_result
      changed_when: "'modifying entry' in monitor_acl_result.stdout"
      failed_when: monitor_acl_result.rc != 0

    - name: 3. Pulizia file temporaneo LDIF
      file:
        path: /tmp/07_configure_monitor.ldif
        state: absent
