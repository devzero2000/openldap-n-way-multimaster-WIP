# ==============================================================================
# TITOLO:       Batteria di Test Corretta per slapo-nestgroup
# AUTORE:       Elia Pinto
# DATA:         Luglio 2026
# SCOPO:        Iniezione dataset statico ad albero, verifica globale
#               della ricorsione memberOf partendo dalla base corretta.
# ==============================================================================

---
- name: "Esecuzione Test e Validazione dei Nested Groups"
  hosts: cluster
  become: true
  vars:
    suffix: "dc=example,dc=com"
    ldap_auth:
      server_uri: "ldapi:///"
      bind_dn: "cn=admin,dc=example,dc=com"
      bind_pw: "openldap"

  tasks:

    # ==========================================================================
    # FASE 1: INIEZIONE DATASET (SOLO COORDINATORE)
    # ==========================================================================
    - name: "[START] Inietta l'utente Mario Rossi"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "uid=mario.rossi,ou=People,{{ suffix }}"
        objectClass: [top, inetOrgPerson]
        attributes:
          uid: "mario.rossi"
          cn: "Mario Rossi"
          sn: "Rossi"
          userPassword: "{SSHA}d3m0Xdfgklm12345!"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[START] Inietta l'utente Giovanni Bianchi"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "uid=giovanni.bianchi,ou=People,{{ suffix }}"
        objectClass: [top, inetOrgPerson]
        attributes:
          uid: "giovanni.bianchi"
          cn: "Giovanni Bianchi"
          sn: "Bianchi"
          userPassword: "{SSHA}d3m0Ydfgklm67890!"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[START] Crea il Sottogruppo statico: Deploy-Stage1"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "cn=Deploy-Stage1,ou=groups,{{ suffix }}"
        objectClass: [top, groupOfNames]
        attributes:
          cn: "Deploy-Stage1"
          description: "Sottogruppo operativo statico"
          member: "uid=mario.rossi,ou=People,{{ suffix }}"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[START] Crea il Gruppo Padre statico: Cloud-Architect"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "cn=Cloud-Architect,ou=groups,{{ suffix }}"
        objectClass: [top, groupOfNames]
        attributes:
          cn: "Cloud-Architect"
          description: "Contiene un utente diretto e un sottogruppo strutturale"
          member:
            - "uid=giovanni.bianchi,ou=People,{{ suffix }}"
            - "cn=Deploy-Stage1,ou=groups,{{ suffix }}"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[CLUSTER] Attendi la convergenza della replica syncrepl"
      ansible.builtin.pause:
        seconds: 2

    # ==========================================================================
    # FASE 2: VERIFICA CON LE QUERY CORRETTE (SU TUTTI I NODI)
    # ==========================================================================
    - name: "[TEST 1/2] Estrai utenti con memberOf=Cloud-Architect usando la base corretta"
      ansible.builtin.command: >
        ldapsearch -H ldap://localhost
        -D '{{ ldap_auth.bind_dn }}' -w '{{ ldap_auth.bind_pw }}'
        -b "{{ suffix }}"
        -s sub "(&(objectClass=inetOrgPerson)(memberOf=cn=Cloud-Architect,ou=groups,{{ suffix }}))" dn
      register: test_nest_1
      changed_when: false

    - name: "[TEST 2/2] Ispezione attributi virtuali ricorsivi partendo dal DN di Mario Rossi"
      ansible.builtin.command: >
        ldapsearch -H ldap://localhost
        -D '{{ ldap_auth.bind_dn }}' -w '{{ ldap_auth.bind_pw }}'
        -b "uid=mario.rossi,ou=People,{{ suffix }}"
        -s base "(objectClass=*)" memberOf
      register: test_nest_2
      changed_when: false

    # ==========================================================================
    # FASE 3: REGISTRO OUTPUT
    # ==========================================================================
    - name: "[AUDIT] Analisi Risultati Nestgroup sul nodo {{ inventory_hostname }}"
      ansible.builtin.debug:
        msg:
          - "================================================================"
          - "RISULTATI TEST 1 (Utenti estratti da Cloud-Architect via memberOf):"
          - "{{ test_nest_1.stdout_lines | select('match', '^dn:') | list }}"
          - "================================================================"
          - "RISULTATI TEST 2 (Campi memberOf generati per Mario Rossi):"
          - "{{ test_nest_2.stdout_lines | select('match', '^memberOf:') | list }}"
          - "================================================================"
