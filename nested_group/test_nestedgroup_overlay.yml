# ==============================================================================
# TITOLO:       Validazione Funzionale Definitiva slapo-nestgroup con Cleanup
# AUTORE:       Elia Pinto
# DATA:         Luglio 2026
# SCOPO:        Iniezione alberatura OU e dataset statico ad albero,
#               validazione della ricorsione dei membri ed eliminazione finale.
# ==============================================================================

---
- name: "Esecuzione Test e Validazione dei Nested Groups"
  hosts: cluster
  become: true
  vars:
    suffix: "dc=example,dc=com"
    ldap_auth:
      server_uri: "ldapi:///"
      bind_dn: "cn=admin,dc=example,dc=com"
      bind_pw: "openldap"

  tasks:

    # ==========================================================================
    # FASE 0: PREPARAZIONE STRUTTURA (SOLO COORDINATORE)
    # ==========================================================================
    - name: "[PREPARE] Crea la Unità Organizzativa People"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "ou=People,{{ suffix }}"
        objectClass: [top, organizationalUnit]
        attributes:
          ou: "People"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[PREPARE] Crea la Unità Organizzativa groups"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "ou=groups,{{ suffix }}"
        objectClass: [top, organizationalUnit]
        attributes:
          ou: "groups"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    # ==========================================================================
    # FASE 1: INIEZIONE DATASET (SOLO COORDINATORE)
    # ==========================================================================
    - name: "[START] Inietta l'utente Mario Rossi"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "uid=mario.rossi,ou=People,{{ suffix }}"
        objectClass: [top, inetOrgPerson]
        attributes:
          uid: "mario.rossi"
          cn: "Mario Rossi"
          sn: "Rossi"
          userPassword: "{SSHA}d3m0Xdfgklm12345!"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[START] Inietta l'utente Giovanni Bianchi"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "uid=giovanni.bianchi,ou=People,{{ suffix }}"
        objectClass: [top, inetOrgPerson]
        attributes:
          uid: "giovanni.bianchi"
          cn: "Giovanni Bianchi"
          sn: "Bianchi"
          userPassword: "{SSHA}d3m0Ydfgklm67890!"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[START] Crea il Sottogruppo statico: Deploy-Stage1"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "cn=Deploy-Stage1,ou=groups,{{ suffix }}"
        objectClass: [top, groupOfNames]
        attributes:
          cn: "Deploy-Stage1"
          description: "Sottogruppo operativo statico"
          member: "uid=mario.rossi,ou=People,{{ suffix }}"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[START] Crea il Gruppo Padre statico: Cloud-Architect"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "cn=Cloud-Architect,ou=groups,{{ suffix }}"
        objectClass: [top, groupOfNames]
        attributes:
          cn: "Cloud-Architect"
          description: "Contiene un utente diretto e un sottogruppo strutturale"
          member:
            - "uid=giovanni.bianchi,ou=People,{{ suffix }}"
            - "cn=Deploy-Stage1,ou=groups,{{ suffix }}"
        state: present
      when: inventory_hostname == groups['cluster'][0]

    - name: "[CLUSTER] Attendi la convergenza della replica syncrepl"
      ansible.builtin.pause:
        seconds: 2

    # ==========================================================================
    # FASE 2: VERIFICA ESPANSIONE RICORSIVA (SU TUTTI I NODI)
    # ==========================================================================
    - name: "[TEST] Interroga il Gruppo Padre per estrarre tutti i membri ricorsivi"
      ansible.builtin.command: >
        ldapsearch -H ldap://localhost
        -D '{{ ldap_auth.bind_dn }}' -w '{{ ldap_auth.bind_pw }}'
        -b "cn=Cloud-Architect,ou=groups,{{ suffix }}"
        -s base "(objectClass=*)" member
      register: test_nest_real
      changed_when: false

    # ==========================================================================
    # FASE 3: REGISTRO OUTPUT DI VERIFICA
    # ==========================================================================
    - name: "[AUDIT] Analisi Risultati Nestgroup sul nodo {{ inventory_hostname }}"
      ansible.builtin.debug:
        msg:
          - "================================================================"
          - "MEMBRI RISOLTI DA SLAPO-NESTGROUP:"
          - "{{ test_nest_real.stdout_lines | select('match', '^member:') | list }}"
          - "================================================================"

    # ==========================================================================
    # FASE 4: CLEANUP COMPLETO DEL DATASET (SOLO COORDINATORE)
    # ==========================================================================
    - name: "[CLEANUP] Rimozione controllata di utenti e gruppi dal DIT"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        bind_dn: "{{ ldap_auth.bind_dn }}"
        bind_pw: "{{ ldap_auth.bind_pw }}"
        dn: "{{ item }}"
        state: absent
      loop:
        - "cn=Cloud-Architect,ou=groups,{{ suffix }}"
        - "cn=Deploy-Stage1,ou=groups,{{ suffix }}"
        - "uid=giovanni.bianchi,ou=People,{{ suffix }}"
        - "uid=mario.rossi,ou=People,{{ suffix }}"
      when: inventory_hostname == groups['cluster'][0]
