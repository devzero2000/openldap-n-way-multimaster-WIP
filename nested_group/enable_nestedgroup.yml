# ==============================================================================
# TITOLO:       Configurazione Infrastruttura slapo-nestgroup (Risolto)
# AUTORE:       Elia Pinto
# DATA:         Luglio 2026
# ==============================================================================

---
- name: "Gestione Infrastruttura slapo-nestgroup su tutto il Cluster"
  hosts: cluster
  become: true
  vars:
    stato: "enable"
    suffix: "dc=example,dc=com"
    target_db: "olcDatabase={1}mdb,cn=config"

  tasks:

    # ==========================================================================
    # CASO: STATO = DISABLE (RIMOZIONE SU TUTTI I NODI)
    # ==========================================================================
    - name: "[DISABLE] Rimuovi l'overlay nestgroup dal database"
      community.general.ldap_entry:
        server_uri: "ldapi:///"
        sasl_class: "external"
        dn: "olcOverlay={0}nestgroup,{{ target_db }}"
        state: absent
      when: stato in ['disable', 'disabled']

    # ==========================================================================
    # CASO: STATO = ENABLE (ATTIVAZIONE SU TUTTI I NODI)
    # ==========================================================================
    - name: "[ENABLE] Carica il modulo globale nestgroup"
      community.general.ldap_attrs:
        server_uri: "ldapi:///"
        sasl_class: "external"
        dn: "cn=module{0},cn=config"
        attributes:
          olcModuleLoad: "nestgroup"
        state: present
      when: stato in ['enable', 'enabled']

    - name: "[ENABLE] Inizializza, Configura e Attiva i Flag di slapo-nestgroup"
      community.general.ldap_entry:
        server_uri: "ldapi:///"
        sasl_class: "external"
        dn: "olcOverlay={0}nestgroup,{{ target_db }}"
        objectClass:
          - olcOverlayConfig
          - olcNestGroupConfig
        attributes:
          olcOverlay: "{0}nestgroup"
          olcNestgroupMember: "member"
          olcNestgroupMemberOf: "memberOf"
          olcNestgroupBase: "ou=groups,{{ suffix }}"
          # ATTIVAZIONE DELLE FUNZIONALITÀ (Flags)
          olcNestgroupFlags:
            - "member-filter"
            - "memberof-filter"
            - "member-values"
            - "memberof-values"
        state: present
      when: stato in ['enable', 'enabled']
