---
- name: "Configurazione Combinata slapo-autogroup + slapo-memberof"
  hosts: cluster
  become: true
  vars:
    stato: "enable"
    ldap_auth:
      server_uri: "ldapi:///"
      sasl_class: "external"
    db_dn: "olcDatabase={1}mdb,cn=config"

  tasks:

    # ==========================================================================
    # FASE 1: MODULI E SCHEMA (USANDO IL MODULO APPOSITORE)
    # ==========================================================================

    - name: "[ENABLE] Carica i moduli globali autogroup e memberof"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "cn=module{0},cn=config"
        attributes:
          olcModuleLoad:
            - "autogroup.la"
            - "memberof.la"
        state: present
      when: stato in ['enable', 'enabled']

    - name: "[ENABLE] Importa formalmente lo schema dyngroup nel cluster"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        # Inseriamo lo schema nel percorso ufficiale di cn=config
        dn: "cn=dyngroup,cn=schema,cn=config"
        objectClass:
          - olcSchemaConfig
        attributes:
          cn: "dyngroup"
          # Definizioni minime necessarie per attivare groupOfURLs e memberURL
          olcAttributeTypes: "( 1.3.6.1.4.1.250.1.32 NAME 'memberURL' DESC 'Identical to labeledURI' SUP labeledURI )"
          olcObjectClasses: "( 1.3.6.1.4.1.250.1.1 NAME 'groupOfURLs' SUP top STRUCTURAL MUST cn MAY ( memberURL $ businessCategory $ description $ o $ ou $ owner $ seeAlso ) )"
        state: present
      # Gestisce in modo nativo se lo schema è già presente o replicato
      register: schema_status
      failed_when:
        - schema_status.failed
        - "'Already exists' not in schema_status.msg"
      when: stato in ['enable', 'enabled']

    - name: "[ENABLE][FLUSH] Riavvia slapd per consolidare il dizionario dati"
      ansible.builtin.systemd:
        name: slapd
        state: restarted
      when: stato in ['enable', 'enabled']

    # ==========================================================================
    # FASE 2: INIZIALIZZAZIONE DELLA CATENA OVERLAY ({0} -> {1})
    # ==========================================================================

    - name: "[ENABLE] Inizializza l'overlay {0}autogroup"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcOverlay={0}autogroup,{{ db_dn }}"
        objectClass:
          - olcOverlayConfig
          - olcAutoGroupConfig
        attributes:
          olcOverlay: "autogroup"
          olcAutoGroupAttrSet: "groupOfURLs memberURL member"
        state: present
      when: stato in ['enable', 'enabled']

    - name: "[ENABLE] Inizializza l'overlay {1}memberof"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcOverlay={1}memberof,{{ db_dn }}"
        objectClass:
          - olcMemberOf
          - olcOverlayConfig
        attributes:
          olcOverlay: "memberof"
          olcMemberOfRefInt: "TRUE"
          olcMemberOfGroupOC: "groupOfNames"
          olcMemberOfMemberAD: "member"
          olcMemberOfMemberOfAD: "memberOf"
        state: present
      when: stato in ['enable', 'enabled']

    # ==========================================================================
    # FASE 3: SMONTAGGIO (STATO = DISABLE)
    # ==========================================================================

    - name: "[DISABLE] Rimuovi l'entry dell'overlay {1}memberof"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcOverlay={1}memberof,{{ db_dn }}"
        state: absent
      when: stato in ['disable', 'disabled']

    - name: "[DISABLE] Rimuovi l'entry dell'overlay {0}autogroup"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.session_uri | default(ldap_auth.server_uri) }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcOverlay={0}autogroup,{{ db_dn }}"
        state: absent
      when: stato in ['disable', 'disabled']

    - name: "[DISABLE] Rimuovi i moduli dalla configurazione globale"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "cn=module{0},cn=config"
        attributes:
          olcModuleLoad:
            - "autogroup.la"
            - "memberof.la"
        state: absent
      when: stato in ['disable', 'disabled']

    # ==========================================================================
    # FASE 4: REFRESH FINALE
    # ==========================================================================

    - name: "Riavvia il demone slapd per rendere definitiva la catena"
      ansible.builtin.systemd:
        name: slapd
        state: restarted
