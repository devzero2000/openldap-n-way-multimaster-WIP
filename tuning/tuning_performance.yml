# ==============================================================================
# TITOLO:       Ottimizzazione, Tuning Performance e Nesting OpenLDAP (cn=config)
# AUTORE:       Elia Pinto
# DATA:         Luglio 2026
# VERSIONE:     1.6
# SCOPO:        Ottimizzare OpenLDAP (Back-MDB) per infrastrutture Cloud ed
#               ecosistemi di automazione/deploy su 7 stage geografici.
#               Configura indici, pool di thread e inizializza l'overlay 
#               memberOf abilitando il nesting ricorsivo reale dei gruppi.
#
# COMPATIBILITÀ: Testato su Ubuntu 24.04 LTS (N-Way Multi-Master Cluster)
# ==============================================================================

---
- name: Ottimizzazione e Configurazione OpenLDAP (cn=config)
  hosts: cluster
  become: true
  vars:
    # Stato di default: attivato
    stato: "enabled"
    
    # Autenticazione nativa locale tramite Socket Unix (SASL EXTERNAL)
    ldap_auth:
      server_uri: "ldapi:///"
      sasl_class: "external"

  tasks:
    # ==========================================================================
    # PRE-REQUISITI: INSTALLAZIONE DIPENDENZE
    # ==========================================================================
    
    - name: "[SETUP] Installa la libreria python3-ldap nativa di sistema"
      ansible.builtin.apt:
        name: python3-ldap
        state: present
        update_cache: yes

    # ==========================================================================
    # CASO: ABILITAZIONE (stato == "enable" o "enabled")
    # ==========================================================================
    
    - name: "[ENABLE] Configura i parametri globali di slapd (Threads e Pending)"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "cn=config"
        attributes:
          olcThreads: 16
          olcConnMaxPending: 100
          olcConnMaxPendingAuth: 50
        state: exact
      when: stato in ['enable', 'enabled']

    - name: "[ENABLE] Carica il modulo globale memberof"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "cn=module{0},cn=config"
        attributes:
          olcModuleLoad: "memberof.la"
        state: present
      when: stato in ['enable', 'enabled']

    - name: "[ENABLE] Inizializza l'entry dell'overlay memberOf con supporto NESTING"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcOverlay={0}memberof,olcDatabase={1}mdb,cn=config"
        objectClass:
          - olcMemberOf
          - olcOverlayConfig
        attributes:
          olcOverlay: "memberof"
          olcMemberOfRefInt: "TRUE"
          olcMemberOfGroupOC: "groupOfNames"
          olcMemberOfMemberAD: "member"
          olcMemberOfMemberOfAD: "memberOf"
        state: present
      when: stato in ['enable', 'enabled']

    - name: "[ENABLE] Ottimizza MaxSize e Indici sul database mdb"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcDatabase={1}mdb,cn=config"
        attributes:
          olcDbMaxSize: "4294967296"
          olcDbIndex:
            - "objectClass eq"
            - "uid eq"
            - "cn eq,sub"
            - "member eq"
            - "memberUid eq"
            - "memberOf eq"
        state: exact
      when: stato in ['enable', 'enabled']

    # ==========================================================================
    # CASO: RIPRISTINO (stato == "disable" o "disabled")
    # ==========================================================================

    - name: "[DISABLE] Rimuovi l'overlay memberOf dal database mdb"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcOverlay={0}memberof,olcDatabase={1}mdb,cn=config"
        state: absent
      when: stato in ['disable', 'disabled']

    - name: "[DISABLE] Rimuovi i parametri globali per tornare ai default nativi"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "cn=config"
        attributes:
          olcThreads: []
          olcConnMaxPending: []
          olcConnMaxPendingAuth: []
        state: absent
      when: stato in ['disable', 'disabled']

    - name: "[DISABLE] Ripristina la dimensione del DB MDB al valore standard"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcDatabase={1}mdb,cn=config"
        attributes:
          olcDbMaxSize: "1073741824"
        state: exact
      when: stato in ['disable', 'disabled']

    - name: "[DISABLE] Rimuovi gli indici di ottimizzazione avanzati"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcDatabase={1}mdb,cn=config"
        attributes:
          olcDbIndex:
            - "uid eq"
            - "cn eq,sub"
            - "member eq"
            - "memberUid eq"
            - "memberOf eq"
        state: absent
      when: stato in ['disable', 'disabled']
