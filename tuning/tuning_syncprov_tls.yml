# ==============================================================================
# TITOLO:       LDAP Tuning 2/3: Ottimizzazione dell'Overlay SyncProv
# AUTORE:       Elia Pinto
# DATA:         Luglio 2026
# VERSIONE:     1.3 (TLS Hardened)
# SCOPO:        Inizializzare e ottimizzare l'overlay SyncProv per la replica
#               N-Way Multi-Master garantendo la tenuta dei buffer in RAM.
# ==============================================================================

---
- name: "LDAP Tuning 2/3: Ottimizzazione dell'Overlay SyncProv"
  hosts: cluster
  become: true
  vars:
    stato: "enable"
    ldap_auth:
      server_uri: "ldapi:///"
      sasl_class: "external"

  tasks:
    - name: "Garantisce la presenza della libreria python3-ldap per l'esecuzione dei moduli"
      ansible.builtin.apt:
        name: python3-ldap
        state: present
        update_cache: yes

    - name: "[ENABLE] Carica il modulo globale syncprov.la"
      community.general.ldap_attrs:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "cn=module{0},cn=config"
        attributes:
          olcModuleLoad: "syncprov.la"
        state: present
      when: stato == "enable"

    - name: "[ENABLE] Inizializza e configura l'overlay syncprov sul database mdb"
      community.general.ldap_entry:
        server_uri: "{{ ldap_auth.server_uri }}"
        sasl_class: "{{ ldap_auth.sasl_class }}"
        dn: "olcOverlay=syncprov,olcDatabase={1}mdb,cn=config"
        objectClass:
          - olcSyncProvConfig
          - olcOverlayConfig
        attributes:
          olcOverlay: "syncprov"
          # Mantiene in RAM le ultime 5000 modifiche per la sincronizzazione rapida (Delta)
          olcSpSessionlog: 5000
          # Scrive il punto di controllo su disco ogni 1000 operazioni o 10 minuti
          olcSpCheckpoint: "1000 10"
        state: present
      when: stato == "enable"
