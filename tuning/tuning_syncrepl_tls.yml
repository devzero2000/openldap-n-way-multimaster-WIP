# ==============================================================================
# TITOLO:       LDAP Tuning 3/3: Ottimizzazione parametri Syncrepl via LDAPS
# AUTORE:       Elia Pinto
# DATA:         Luglio 2026
# VERSIONE:     1.8 (Exclude memberOf via exattrs)
# SCOPO:        Applicazione del tuning dei vettori di replica forzando l'uso
#               di LDAPS protetto e abilitazione contestuale del MultiProvider.
# ==============================================================================

---
- name: "LDAP Tuning 3/3: Parametri Syncrepl per WAN via LDAPS"
  hosts: cluster
  become: true
  vars:
    ldap_basedn: "dc=example,dc=com"
    ldap_repl_user: "cn=nwayreplicator,ou=system,dc=example,dc=com"
    ldap_repl_pass: "nwayreplicator"
  
    # Asset della PKI locale definiti nel deploy hardened principale
    ssl_ca_path: "/etc/ldap/sasl2/ca.crt"
    ssl_cert_path: "/etc/ldap/sasl2/ldap-server.crt"
    ssl_key_path: "/etc/ldap/sasl2/ldap-server.key"

    # Aggiunto exattrs=memberOf in ogni record per proteggere la catena autogroup+memberof
    cluster_providers:
      ubuntu24lts1.example.com:
        - 'rid=002 provider=ldaps://ubuntu24lts2.example.com:636 binddn="{{ ldap_repl_user }}" bindmethod=simple credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist exattrs=memberOf retry="5 5 10 10 30 30 60 +" timeout=0 network-timeout=15 keepalive=240:4:15 tls_cacert={{ ssl_ca_path }} tls_cert={{ ssl_cert_path }} tls_key={{ ssl_key_path }} tls_reqcert=demand'
        - 'rid=003 provider=ldaps://ubuntu24lts3.example.com:636 binddn="{{ ldap_repl_user }}" bindmethod=simple credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist exattrs=memberOf retry="5 5 10 10 30 30 60 +" timeout=0 network-timeout=15 keepalive=240:4:15 tls_cacert={{ ssl_ca_path }} tls_cert={{ ssl_cert_path }} tls_key={{ ssl_key_path }} tls_reqcert=demand'
      ubuntu24lts2.example.com:
        - 'rid=001 provider=ldaps://ubuntu24lts1.example.com:636 binddn="{{ ldap_repl_user }}" bindmethod=simple credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist exattrs=memberOf retry="5 5 10 10 30 30 60 +" timeout=0 network-timeout=15 keepalive=240:4:15 tls_cacert={{ ssl_ca_path }} tls_cert={{ ssl_cert_path }} tls_key={{ ssl_key_path }} tls_reqcert=demand'
        - 'rid=003 provider=ldaps://ubuntu24lts3.example.com:636 binddn="{{ ldap_repl_user }}" bindmethod=simple credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist exattrs=memberOf retry="5 5 10 10 30 30 60 +" timeout=0 network-timeout=15 keepalive=240:4:15 tls_cacert={{ ssl_ca_path }} tls_cert={{ ssl_cert_path }} tls_key={{ ssl_key_path }} tls_reqcert=demand'
      ubuntu24lts3.example.com:
        - 'rid=001 provider=ldaps://ubuntu24lts1.example.com:636 binddn="{{ ldap_repl_user }}" bindmethod=simple credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist exattrs=memberOf retry="5 5 10 10 30 30 60 +" timeout=0 network-timeout=15 keepalive=240:4:15 tls_cacert={{ ssl_ca_path }} tls_cert={{ ssl_cert_path }} tls_key={{ ssl_key_path }} tls_reqcert=demand'
        - 'rid=002 provider=ldaps://ubuntu24lts2.example.com:636 binddn="{{ ldap_repl_user }}" bindmethod=simple credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist exattrs=memberOf retry="5 5 10 10 30 30 60 +" timeout=0 network-timeout=15 keepalive=240:4:15 tls_cacert={{ ssl_ca_path }} tls_cert={{ ssl_cert_path }} tls_key={{ ssl_key_path }} tls_reqcert=demand'

  tasks:
    - name: "Applicazione configurazione repliche ed attivazione olcMultiProvider via LDIF"
      ansible.builtin.shell: |
        ldapmodify -Y EXTERNAL -H ldapi:/// <<EOF
        dn: olcDatabase={1}mdb,cn=config
        changetype: modify
        replace: olcMultiProvider
        olcMultiProvider: TRUE
        -
        replace: olcSyncRepl
        {% for line in cluster_providers[ansible_facts['fqdn']] %}
        olcSyncRepl: {{ line }}
        {% endfor %}
        EOF
      register: ldif_repl_result
      changed_when: "'modifying entry' in ldif_repl_result.stdout"
      failed_when: ldif_repl_result.rc != 0
