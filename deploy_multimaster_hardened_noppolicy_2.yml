# ==============================================================================
# TITOLO:       Configurazione Cluster OpenLDAP Multi-Master a 3 vie - NO TLS
# VERSIONE:     1.8 (Validato - Senza Indici Rigidi)
# ==============================================================================

---
- name: Configurazione Cluster OpenLDAP Multi-Master a 3 vie (Modern N-Way) - NO TLS
  hosts: cluster
  become: true
  vars:
    ldap_basedn: "dc=example,dc=com"
    ldap_rootdn: "cn=admin,dc=example,dc=com"
    ldap_rootpw: "openldap"
    
    ldap_repl_user: "cn=nwayreplicator,ou=system,dc=example,dc=com"
    ldap_repl_pass: "nwayreplicator"
    ldap_admin_group: "cn=administrators,ou=groups,dc=example,dc=com"

  tasks:
    - name: 1. Installazione di OpenLDAP e utility client
      apt:
        name:
          - slapd
          - ldap-utils
        state: present
        update_cache: yes

    - name: "Garantisci che slapd sia attivo per accettare configurazioni"
      service:
        name: slapd
        state: started

    - name: 2. Configurazione dei parametri di default in /etc/ldap/ldap.conf
      blockinfile:
        path: /etc/ldap/ldap.conf
        block: |
          BASE    {{ ldap_basedn }}
          URI     ldap://localhost
        marker: "# {mark} ANSIBLE MANAGED BLOCK - DEFAULT LDAP SETTINGS"

    - name: 3. Configurazione della password di Root in formato SSHA
      shell: slappasswd -s {{ ldap_rootpw }}
      register: ldap_hashed_pw
      changed_when: false

    - name: 4. Creazione del file LDIF per la configurazione del Database base
      copy:
        dest: /tmp/01_db_init.ldif
        content: |
          dn: olcDatabase={1}mdb,cn=config
          changetype: modify
          replace: olcSuffix
          olcSuffix: {{ ldap_basedn }}
          -
          replace: olcRootDN
          olcRootDN: {{ ldap_rootdn }}
          -
          replace: olcRootPW
          olcRootPW: {{ ldap_hashed_pw.stdout }}
  
    - name: 5. Applicazione configurazione Database di base
      shell: ldapmodify -Y EXTERNAL -H ldapi:/// -f /tmp/01_db_init.ldif
      register: db_init_result
      failed_when: "'ERR' in db_init_result.stderr and 'Duplicate' not in db_init_result.stderr"

    - name: A. Blocco dei Bind Anonimi a livello globale
      copy:
        dest: /tmp/01b_disable_anon.ldif
        content: |
          dn: cn=config
          changetype: modify
          add: olcRequires
          olcRequires: authc
          -
          add: olcDisallows
          olcDisallows: bind_anon
      register: create_anon_ldif

    - name: B. Applicazione blocco anonimi
      shell: ldapmodify -Y EXTERNAL -H ldapi:/// -f /tmp/01b_disable_anon.ldif
      register: anon_result
      failed_when: 
        - anon_result.rc != 0
        - "'Type or value exists' not in anon_result.stderr"

    - name: C. Generazione LDIF per ACL Globali (olcAccess)
      copy:
        dest: /tmp/01c_acl_init.ldif
        content: |
          dn: olcDatabase={1}mdb,cn=config
          changetype: modify
          replace: olcAccess
          olcAccess: {0}to dn.base="" by anonymous read by * read
          olcAccess: {1}to dn.base="cn=Subschema" by anonymous read by * read
          olcAccess: {2}to attrs=userPassword by self write by group.exact="{{ ldap_admin_group }}" write by dn.exact="{{ ldap_rootdn }}" write by * auth
          olcAccess: {3}to attrs=shadowLastChange by self write by * read
          olcAccess: {4}to dn.subtree="{{ ldap_basedn }}" by group.exact="{{ ldap_admin_group }}" write by dn.exact="{{ ldap_rootdn }}" write by self write by users read by * none

    - name: D. Applicazione ACL Globali
      shell: ldapmodify -Y EXTERNAL -H ldapi:/// -f /tmp/01c_acl_init.ldif
      register: acl_result
      failed_when:
        - acl_result.rc != 0

    - name: E. Generazione LDIF per OUs di Sistema, Gruppo e Utente Replicator
      copy:
        dest: /tmp/01e_bootstrap_dit.ldif
        content: |
          dn: ou=system,{{ ldap_basedn }}
          changetype: add
          objectClass: top
          objectClass: organizationalUnit
          ou: system

          dn: ou=groups,{{ ldap_basedn }}
          changetype: add
          objectClass: top
          objectClass: organizationalUnit
          ou: groups

          dn: {{ ldap_repl_user }}
          changetype: add
          objectClass: top
          objectClass: person
          objectClass: organizationalPerson
          objectClass: inetOrgPerson
          cn: nwayreplicator
          sn: Replicator
          userPassword: {{ ldap_repl_pass }}

          dn: {{ ldap_admin_group }}
          changetype: add
          objectClass: top
          objectClass: groupOfNames
          cn: administrators
          member: {{ ldap_repl_user }}

    - name: F. Applicazione Struttura DIT Iniziale (Con privilegi cn=admin)
      shell: ldapadd -x -D "{{ ldap_rootdn }}" -w "{{ ldap_rootpw }}" -H ldapi:/// -f /tmp/01e_bootstrap_dit.ldif
      register: dit_result
      failed_when:
        - dit_result.rc != 0
        - "'Already exists' not in dit_result.stderr"

    - name: "6. Generazione LDIF per ServerID e caricamento modulo syncprov"
      copy:
        dest: /tmp/02_replication_setup.ldif
        content: |
          dn: cn=config
          changetype: modify
          replace: olcServerID
          olcServerID: 1 ldap://ubuntu24lts1.example.com
          olcServerID: 2 ldap://ubuntu24lts2.example.com
          olcServerID: 3 ldap://ubuntu24lts3.example.com

          dn: cn=module{0},cn=config
          changetype: modify
          add: olcModuleLoad
          olcModuleLoad: syncprov

    - name: "7. Applicazione ServerID e caricamento moduli"
      shell: ldapmodify -Y EXTERNAL -H ldapi:/// -f /tmp/02_replication_setup.ldif
      register: setup_module_result
      failed_when:
        - setup_module_result.rc != 0
        - "'already exists' not in setup_module_result.stderr"
        - "'Type or value exists' not in setup_module_result.stderr"

    - name: "8. Generazione LDIF per attivazione overlay syncprov"
      copy:
        dest: /tmp/03_enable_overlays.ldif
        content: |
          dn: olcOverlay=syncprov,olcDatabase={1}mdb,cn=config
          changetype: add
          objectClass: olcOverlayConfig
          objectClass: olcSyncProvConfig
          olcOverlay: syncprov

    - name: "9. Applicazione overlay syncprov"
      shell: ldapadd -Y EXTERNAL -H ldapi:/// -f /tmp/03_enable_overlays.ldif
      register: overlay_result
      failed_when: 
        - overlay_result.rc != 0 
        - "'already in list' not in overlay_result.stderr"
        - "'Already exists' not in overlay_result.stderr"

    - name: 10. Generazione LDIF per Syncrepl e MultiProvider (Asimmetria Corretta Senza Indici)
      copy:
        dest: /tmp/04_multimaster.ldif
        content: |
          dn: olcDatabase={1}mdb,cn=config
          changetype: modify
          replace: olcSyncRepl
          {% if ansible_facts['fqdn'] == 'ubuntu24lts1.example.com' %}
          olcSyncRepl: rid=002 provider=ldap://ubuntu24lts2.example.com bindmethod=simple binddn="{{ ldap_repl_user }}" credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist retry="5 10 10 30 60 120 300 +" timeout=0 keepalive=240:4:15
          olcSyncRepl: rid=003 provider=ldap://ubuntu24lts3.example.com bindmethod=simple binddn="{{ ldap_repl_user }}" credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist retry="5 10 10 30 60 120 300 +" timeout=0 keepalive=240:4:15
          {% elif ansible_facts['fqdn'] == 'ubuntu24lts2.example.com' %}
          olcSyncRepl: rid=001 provider=ldap://ubuntu24lts1.example.com bindmethod=simple binddn="{{ ldap_repl_user }}" credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist retry="5 10 10 30 60 120 300 +" timeout=0 keepalive=240:4:15
          olcSyncRepl: rid=003 provider=ldap://ubuntu24lts3.example.com bindmethod=simple binddn="{{ ldap_repl_user }}" credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist retry="5 10 10 30 60 120 300 +" timeout=0 keepalive=240:4:15
          {% elif ansible_facts['fqdn'] == 'ubuntu24lts3.example.com' %}
          olcSyncRepl: rid=001 provider=ldap://ubuntu24lts1.example.com bindmethod=simple binddn="{{ ldap_repl_user }}" credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist retry="5 10 10 30 60 120 300 +" timeout=0 keepalive=240:4:15
          olcSyncRepl: rid=002 provider=ldap://ubuntu24lts2.example.com bindmethod=simple binddn="{{ ldap_repl_user }}" credentials={{ ldap_repl_pass }} searchbase="{{ ldap_basedn }}" type=refreshAndPersist retry="5 10 10 30 60 120 300 +" timeout=0 keepalive=240:4:15
          {% endif %}
          -
          replace: olcMultiProvider
          olcMultiProvider: TRUE

    - name: 11. Applicazione configurazione Syncrepl e MultiProvider
      shell: ldapmodify -Y EXTERNAL -H ldapi:/// -f /tmp/04_multimaster.ldif
      register: multimaster_result
      failed_when: >
        multimaster_result.rc != 0 and
        'Already exists' not in multimaster_result.stderr and
        'Duplicate' not in multimaster_result.stderr and
        'typeIsCritical' not in multimaster_result.stderr and
        'Type or value exists' not in multimaster_result.stderr

    - name: G. Ottimizzazioni Performance Database MDB
      copy:
        dest: /tmp/06_db_tuning.ldif
        content: |
          dn: olcDatabase={1}mdb,cn=config
          changetype: modify
          add: olcDbNoSync
          olcDbNoSync: TRUE

          dn: cn=config
          changetype: modify
          add: olcWriteTimeout
          olcWriteTimeout: 30

    - name: H. Applicazione parametri di Tuning Database
      shell: ldapmodify -Y EXTERNAL -H ldapi:/// -f /tmp/06_db_tuning.ldif
      register: tuning_result
      failed_when:
        - tuning_result.rc != 0
        - "'Type or value exists' not in tuning_result.stderr"
        - "'attribute OR type already exists' not in tuning_result.stderr"

    - name: 12. Generazione LDIF per inizializzazione del backend cn=Monitor
      copy:
        dest: /tmp/05_monitor.ldif
        content: |
          dn: olcDatabase={2}monitor,cn=config
          changetype: add
          objectClass: olcDatabaseConfig
          olcDatabase: {2}monitor
          olcAccess: {0}to * by dn.base="{{ ldap_rootdn }}" read by group.exact="{{ ldap_admin_group }}" read by * none

    - name: 13. Applicazione configurazione backend cn=Monitor
      shell: ldapadd -Y EXTERNAL -H ldapi:/// -f /tmp/05_monitor.ldif
      register: monitor_result
      failed_when:
        - monitor_result.rc != 0
        - "'Already exists' not in monitor_result.stderr"
        - "'Type or value exists' not in monitor_result.stderr"
        - "'only one monitor database allowed' not in monitor_result.stderr"     
          
    - name: 14. Configurazione ascolto slapd (Solo LDAP e LDAPI)
      lineinfile:
        path: /etc/default/slapd
        regexp: '^SLAPD_SERVICES='
        line: 'SLAPD_SERVICES="ldap:/// ldapi:///"'
      notify: Riavvia Slapd

  handlers:
    - name: Riavvia Slapd
      service:
        name: slapd
        state: restarted
