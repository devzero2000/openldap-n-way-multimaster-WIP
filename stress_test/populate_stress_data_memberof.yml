# ==============================================================================
# TITOLO:       Generatore di Carico Dimensionale per slapo-memberof (Definitivo)
# AUTORE:       Elia Pinto
# DATA:         14 Luglio 2026
# SCOPO:        Iniezione massiva di 30k utenti e gruppi flat per stress-test
#               dell'overlay memberof in ambiente Multi-Master.
# ==============================================================================

---
- name: "Generazione Dataset Massivo per Stress Test slapo-memberof"
  hosts: ubuntu24lts1.example.com
  become: true
  vars:
    suffix: "dc=example,dc=com"
    ldif_path: "/tmp/stress_test_data.ldif"
    ldap_pw: "openldap"

  tasks:
    - name: "[TEMPLATING] Genera lo script Python per creare il dataset flat"
      ansible.builtin.copy:
        dest: /tmp/generate_ldif.py
        mode: '0755'
        content: |
          #!/usr/bin/env python3
          import hashlib
          import base64
          import os

          suffix = "{{ suffix }}"

          def make_ssha_password(password_plain):
              salt = os.urandom(4)
              ctx = hashlib.sha1(password_plain.encode('utf-8'))
              ctx.update(salt)
              ssha_hash = base64.b64encode(ctx.digest() + salt).decode('utf-8')
              # Escape corretto per Ansible e Python
              return "{SSHA}" + ssha_hash

          with open("{{ ldif_path }}", "w") as f:
              f.write(f"dn: ou=People,{suffix}\nchangetype: add\nobjectClass: top\nobjectClass: organizationalUnit\nou: People\n\n")
              f.write(f"dn: ou=groups,{suffix}\nchangetype: add\nobjectClass: top\nobjectClass: organizationalUnit\nou: groups\n\n")

              # 1. 30.000 Utenti
              for i in range(1, 30001):
                  username = f"user.{i}"
                  ssha_password = make_ssha_password(f"{username}.1")
                  f.write(f"dn: uid={username},ou=People,{suffix}\nchangetype: add\nobjectClass: top\nobjectClass: inetOrgPerson\nuid: {username}\ncn: Test User{i}\nsn: User{i}\nuserPassword: {ssha_password}\n\n")
              
              # 2. 30.000 Gruppi Periferici (10 membri cad.)
              for i in range(1, 30001):
                  f.write(f"dn: cn=group.{i},ou=groups,{suffix}\nchangetype: add\nobjectClass: top\nobjectClass: groupOfNames\ncn: group.{i}\ndescription: Gruppo {i}\n")
                  start = ((i * 10) % 30000) + 1
                  for u in range(start, start + 10):
                      f.write(f"member: uid=user.{u if u <= 30000 else u - 30000},ou=People,{suffix}\n")
                  f.write("\n")
              
              # 3. 40 Ruoli Globali (10.000 membri diretti cad.)
              for i in range(1, 41):
                  f.write(f"dn: cn=architect.{i},ou=groups,{suffix}\nchangetype: add\nobjectClass: top\nobjectClass: groupOfNames\ncn: architect.{i}\ndescription: Ruolo Cloud {i}\n")
                  start = ((i * 500) % 20000) + 1
                  for u in range(start, start + 10000):
                      f.write(f"member: uid=user.{u if u <= 30000 else u - 30000},ou=People,{suffix}\n")
                  f.write("\n")

    - name: "[EXECUTE] Esegui lo script Python per generare l'LDIF"
      ansible.builtin.command: python3 /tmp/generate_ldif.py
      changed_when: true

    - name: "[IMPORT] Inietta il dataset massivo"
      ansible.builtin.command: >
        ldapmodify -a -c -H ldapi:/// -D "cn=admin,{{ suffix }}" -w "{{ ldap_pw }}" -f "{{ ldif_path }}"
      register: ldapadd_res
      changed_when: true
      failed_when: "ldapadd_res.rc != 0 and 'Already exists' not in ldapadd_res.stderr"

    - name: "[CLEANUP] Rimuovi file temporanei"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/generate_ldif.py"
        - "{{ ldif_path }}"
