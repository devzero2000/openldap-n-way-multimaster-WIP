# ==============================================================================
# TITOLO:       Innalzamento Limiti di Query sul Cluster Multi-Master
# AUTORE:       Elia Pinto
# DATA:         Luglio 2026
# SCOPO:        Applicare la modifica di olcSizelimit su tutti i nodi del cluster
# ==============================================================================

---
- name: "Innalzamento olcSizelimit su tutti i nodi"
  hosts: cluster
  become: true
  vars:
    target_db: "olcDatabase={1}mdb,cn=config"

  tasks:
    - name: "[LIMITS] Genera il file LDIF per i limiti sul nodo"
      ansible.builtin.copy:
        dest: /tmp/raise_limits.ldif
        content: |
          dn: {{ target_db }}
          changetype: modify
          replace: olcSizelimit
          olcSizelimit: size.soft=50000 size.hard=unlimited size.pr=unlimited

    - name: "[LIMITS] Applica la modifica dei limiti via ldapmodify"
      ansible.builtin.command: >
        ldapmodify -Y EXTERNAL -H ldapi:/// -f /tmp/raise_limits.ldif
      register: limit_apply_result
      changed_when: limit_apply_result.rc == 0

    - name: "[CLEANUP] Rimuovi il file LDIF temporaneo"
      ansible.builtin.file:
        path: /tmp/raise_limits.ldif
        state: absent
