# ==============================================================================
# TITOLO:       Tuning Ottimizzato per Inserimento Massivo (Sincrono Sicuro)
# SCOPO:        Innalza SessionLog ed estende Checkpoint mantenendo NoSync su FALSE
# ==============================================================================

---
- name: Playbook Temporaneo - Tuning Ottimizzato per Inserimento Massivo
  hosts: cluster
  become: true

  tasks:
    - name: "[TUNING MASSIVO] Applicazione parametri ottimizzati e Sync su Disco"
      shell: |
        ldapmodify -Y EXTERNAL -H ldapi:/// <<EOF
        dn: olcOverlay={0}syncprov,olcDatabase={1}mdb,cn=config
        changetype: modify
        replace: olcSpSessionlog
        olcSpSessionlog: 100000
        -
        replace: olcSpCheckpoint
        olcSpCheckpoint: 10000 10

        dn: olcDatabase={1}mdb,cn=config
        changetype: modify
        replace: olcDbNoSync
        olcDbNoSync: FALSE
        EOF
      register: tuning_result
      changed_when: "'modifying entry' in tuning_result.stdout"
      failed_when: tuning_result.rc != 0

    - name: Consolida le modifiche sul disco riavviando slapd
      systemd:
        name: slapd
        state: restarted
