---
- name: "Simulazione cambio password distribuito lato Utente (N-Way Replication Test)"
  hosts: cluster
  become: false
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ldap_basedn: "dc=example,dc=com"
    node_user_mapping:
      ubuntu24lts1.example.com: [1, 2, 3]
      ubuntu24lts2.example.com: [4, 5, 6]
      ubuntu24lts3.example.com: [7, 8, 9, 10]

  tasks:
    - name: "Blocco Esecuzione Cambi Password"
      block:
        - name: "Esecuzione cambi password lato client per gli utenti assegnati"
          shell: |
            USER_DN="uid=user{{ "%02d" | format(item) }},ou=People,{{ ldap_basedn }}"
            CURRENT_PW="user{{ "%02d" | format(item) }}password"
            NEW_PW="${CURRENT_PW}.1"

            ldappasswd -x -H ldap://localhost \
              -D "$USER_DN" \
              -w "$CURRENT_PW" \
              -s "$NEW_PW"
          loop: "{{ node_user_mapping[ansible_facts['fqdn']] | default([]) }}"
          register: passwd_simulation_results
          changed_when: true

      rescue:
        - name: "PRINTF CRITICO: Fallimento Fase di Scrittura/Cambio"
          pause:
            seconds: 1
            prompt: |
              
              =====================================================================
                 [FALLIMENTO] LA SIMULAZIONE DEL CAMBIO PASSWORD È FALLITA!
              =====================================================================
              Dettaglio: Uno o più utenti non sono riusciti ad autenticarsi (Bind).
              Causa probabile: Le password correnti nel DB sono già state modificate
              da una precedente esecuzione o i dati non sono sincronizzati.
              
              Soluzione: Ripristinare il database eseguendo 'populate_data.yml'.
              =====================================================================

        # Forziamo il fallimento definitivo per escludere l'host dai Play futuri
        - name: "Abbattimento totale e incondizionato del flusso"
          fail:
            msg: "Playbook abortito nel rescue per prevenire falsi positivi di audit."

# ------------------------------------------------------------------------------
# FASE DI AUDIT (Viene eseguita SOLO se il Play sopra ha chiuso con successo)
# ------------------------------------------------------------------------------
- name: "Audit finale di conformità e convergenza su Node 1"
  hosts: ubuntu24lts1.example.com
  become: false
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ldap_basedn: "dc=example,dc=com"

  tasks:
    - name: "Blocco di Convalida e Certificazione Coherence"
      block:
        - name: "Pausa di convergenza per consentire il transito dei pacchetti syncrepl"
          pause:
            seconds: 2

        - name: "Verifica e validazione dell'autenticazione con le NUOVE password"
          shell: |
            USER_DN="uid=user{{ "%02d" | format(item) }},ou=People,{{ ldap_basedn }}"
            EXPECTED_NEW_PW="user{{ "%02d" | format(item) }}password.1"

            ldapsearch -x -H ldap://localhost \
              -D "$USER_DN" \
              -w "$EXPECTED_NEW_PW" \
              -b "$USER_DN" -s base objectClass > /dev/null
          loop: "{{ range(1, 11) | list }}"
          changed_when: false

        - name: "PRINTF: Certificazione Esito Cluster"
          pause:
            seconds: 1
            prompt: |
              
              =====================================================================
                 VERIFICA COERENZA CLUSTER MULTI-MASTER EFFETTUATA CON SUCCESSO
              =====================================================================
              Stato: TUTTI I 10 UTENTI HANNO AGGIORNATO LA PASSWORD CORRETTAMENTE.
              Replica N-Way: CONVERGENTE E ALLINEATA SUL NODO 1.
              Data Audit: {{ ansible_facts['date_time']['iso8601'] }}
              
              Ricordati di rieseguire il popolamento per ripristinare i dati iniziali
              eseguendo ansible-playbook populate_data.yml
              =====================================================================

      rescue:
        - name: "PRINTF CRITICO: Rilevato Errore o Desincronizzazione nell'Audit"
          pause:
            seconds: 1
            prompt: |
              
              =====================================================================
                 [FALLIMENTO] L'AUDIT DI VERIFICA CRITTOGRAFICA È FALLITO!
              =====================================================================
              La replica N-Way Multi-Master ha riscontrato un blocco o una latenza
              superiore ai tempi di timeout stabiliti sul Nodo 1.
              =====================================================================
          
        - name: "Fallimento controllato dell'Audit"
          fail:
            msg: "Verifica finale fallita sul database."
